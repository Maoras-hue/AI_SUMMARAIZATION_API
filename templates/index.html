<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Text Summarizer</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            color: white;
            min-height: 100vh;
        }
        .navbar {
            background: rgba(0,0,0,0.3);
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .navbar h1 { color: #e94560; font-size: 24px; }
        .credits-badge {
            background: #e94560;
            padding: 8px 20px;
            border-radius: 20px;
            font-weight: bold;
        }
        .container { max-width: 900px; margin: 0 auto; padding: 40px 20px; }
        .card {
            background: rgba(255,255,255,0.05);
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 25px;
            border: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
        }
        .card h2 { 
            color: #e94560;
            margin-bottom: 20px;
            font-size: 20px;
        }
        .form-group { margin-bottom: 15px; }
        label {
            display: block;
            margin-bottom: 5px;
            color: #aaa;
            font-size: 14px;
        }
        input, textarea {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 8px;
            background: rgba(0,0,0,0.3);
            color: white;
            font-size: 16px;
        }
        textarea { min-height: 200px; resize: vertical; }
        button {
            padding: 12px 30px;
            background: #e94560;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-right: 10px;
            margin-top: 10px;
        }
        button:hover { background: #c73e54; }
        button.secondary {
            background: transparent;
            border: 1px solid #e94560;
        }
        .result-box {
            background: rgba(0,0,0,0.3);
            padding: 20px;
            border-radius: 8px;
            margin-top: 15px;
            display: none;
            border: 1px solid rgba(255,255,255,0.2);
        }
        .result-box.show { display: block; }
        .success { color: #4ade80; }
        .error { color: #e94560; }
        .tabs { display: flex; gap: 5px; margin-bottom: 20px; }
        .tab {
            padding: 10px 20px;
            background: transparent;
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
            cursor: pointer;
            border-radius: 8px;
        }
        .tab.active { background: #e94560; border-color: #e94560; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .summary-output {
            background: rgba(0,0,0,0.4);
            padding: 20px;
            border-radius: 8px;
            line-height: 1.6;
            font-size: 16px;
        }
        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-top: 15px;
        }
        .info-item {
            background: rgba(0,0,0,0.2);
            padding: 15px;
            border-radius: 8px;
            text-align: center;
        }
        .info-item .value { font-size: 24px; color: #e94560; font-weight: bold; }
        .info-item .label { font-size: 12px; color: #aaa; margin-top: 5px; }
    </style>
</head>
<body>
    <div class="navbar">
        <h1> AI Text Summarizer</h1>
        <div class="credits-badge" id="creditsDisplay">100 Credits</div>
    </div>

    <div class="container">
        <!-- Auth Card -->
        <div class="card" id="authCard">
            <h2> Get Started</h2>
            <div class="tabs">
                <button class="tab active" onclick="showTab('register')">Register</button>
                <button class="tab" onclick="showTab('login')">Login</button>
            </div>

            <div class="tab-content active" id="registerTab">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="regEmail" placeholder="your@email.com">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="regPassword" placeholder="Create password">
                </div>
                <button onclick="register()">Create Account</button>
                <div class="result-box" id="regResult"></div>
            </div>

            <div class="tab-content" id="loginTab">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="loginEmail" placeholder="your@email.com">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="loginPassword" placeholder="Your password">
                </div>
                <button onclick="login()">Sign In</button>
                <div class="result-box" id="loginResult"></div>
            </div>
        </div>

        <!-- Summarize Card -->
        <div class="card" id="summarizeCard" style="display:none;">
            <h2>📝 Summarize Text</h2>
            <div class="form-group">
                <label>Paste your text below (1 credit per use)</label>
                <textarea id="textInput" placeholder="Paste your long text here..."></textarea>
            </div>
            <button onclick="summarize()"> Summarize Now</button>
            <button class="secondary" onclick="buyCredits()"> Buy Credits ($10/1000)</button>
            <div class="result-box" id="summaryResult"></div>
        </div>

        <!-- Info Card -->
        <div class="card" id="infoCard" style="display:none;">
            <h2> Your Account</h2>
            <div class="info-grid">
                <div class="info-item">
                    <div class="value" id="creditCount">100</div>
                    <div class="label">Credits Remaining</div>
                </div>
                <div class="info-item">
                    <div class="value" id="apiCalls">0</div>
                    <div class="label">API Calls Today</div>
                </div>
            </div>
        </div>
    </div>

    <script>
       let userToken = localStorage.getItem('token');
let userCredits = localStorage.getItem('credits') || 100;

// Always show auth first, then verify token
if (userToken) {
    // Verify token is still valid
    fetch('/credits', {
        headers: { 'Authorization': 'Bearer ' + userToken }
    })
    .then(r => {
        if (r.ok) return r.json();
        throw new Error('Invalid token');
    })
    .then(data => {
        userCredits = data.credits;
        showApp();
    })
    .catch(() => {
        localStorage.clear();
        userToken = null;
        showAuth();
    });
} else {
    showAuth();
}

function showAuth() {
    document.getElementById('authCard').style.display = 'block';
    document.getElementById('summarizeCard').style.display = 'none';
    document.getElementById('infoCard').style.display = 'none';
}

function showApp() {
    document.getElementById('authCard').style.display = 'none';
    document.getElementById('summarizeCard').style.display = 'block';
    document.getElementById('infoCard').style.display = 'block';
    document.getElementById('creditsDisplay').textContent = userCredits + ' Credits';
    document.getElementById('creditCount').textContent = userCredits;
}
        let userCredits = localStorage.getItem('credits') || 100;

        // Check if already logged in
        if (userToken) {
            document.getElementById('authCard').style.display = 'none';
            document.getElementById('summarizeCard').style.display = 'block';
            document.getElementById('infoCard').style.display = 'block';
            document.getElementById('creditsDisplay').textContent = userCredits + ' Credits';
            document.getElementById('creditCount').textContent = userCredits;
        }

        function showTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            
            if (tab === 'register') {
                document.querySelectorAll('.tab')[0].classList.add('active');
                document.getElementById('registerTab').classList.add('active');
            } else {
                document.querySelectorAll('.tab')[1].classList.add('active');
                document.getElementById('loginTab').classList.add('active');
            }
        }

        function register() {
            const email = document.getElementById('regEmail').value;
            const password = document.getElementById('regPassword').value;
            const resultBox = document.getElementById('regResult');

            if (!email || !password) {
                showResult(resultBox, 'Please fill all fields', 'error');
                return;
            }

            resultBox.classList.add('show');
            resultBox.innerHTML = 'Creating account...';

            fetch('/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            })
            .then(r => r.json())
            .then(data => {
                if (data.token) {
                    userToken = data.token;
                    userCredits = data.user.credits;
                    localStorage.setItem('token', userToken);
                    localStorage.setItem('credits', userCredits);
                    
                    showResult(resultBox, ' Account created! You got 100 free credits.', 'success');
                    
                    setTimeout(() => {
                        document.getElementById('authCard').style.display = 'none';
                        document.getElementById('summarizeCard').style.display = 'block';
                        document.getElementById('infoCard').style.display = 'block';
                        document.getElementById('creditsDisplay').textContent = userCredits + ' Credits';
                        document.getElementById('creditCount').textContent = userCredits;
                    }, 1000);
                } else {
                    showResult(resultBox, ' ' + data.error, 'error');
                }
            })
            .catch(err => {
                showResult(resultBox, ' Connection error. Try again.', 'error');
            });
        }

        function login() {
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            const resultBox = document.getElementById('loginResult');

            if (!email || !password) {
                showResult(resultBox, 'Please fill all fields', 'error');
                return;
            }

            resultBox.classList.add('show');
            resultBox.innerHTML = ' Signing in...';

            fetch('/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            })
            .then(r => r.json())
            .then(data => {
                if (data.token) {
                    userToken = data.token;
                    userCredits = data.user.credits;
                    localStorage.setItem('token', userToken);
                    localStorage.setItem('credits', userCredits);
                    
                    showResult(resultBox, '✅ Signed in!', 'success');
                    
                    setTimeout(() => {
                        document.getElementById('authCard').style.display = 'none';
                        document.getElementById('summarizeCard').style.display = 'block';
                        document.getElementById('infoCard').style.display = 'block';
                        document.getElementById('creditsDisplay').textContent = userCredits + ' Credits';
                        document.getElementById('creditCount').textContent = userCredits;
                    }, 1000);
                } else {
                    showResult(resultBox, ' ' + data.error, 'error');
                }
            })
            .catch(err => {
                showResult(resultBox, ' Connection error', 'error');
            });
        }

        function summarize() {
            const text = document.getElementById('textInput').value;
            const resultBox = document.getElementById('summaryResult');

            if (!text) {
                showResult(resultBox, 'Please enter text to summarize', 'error');
                return;
            }

            resultBox.classList.add('show');
            resultBox.innerHTML = ' Summarizing... (first time may take 30-60 seconds)';

            fetch('/summarize', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': 'Bearer ' + userToken
                },
                body: JSON.stringify({ text: text })
            })
            .then(r => r.json())
            .then(data => {
                if (data.success) {
                    userCredits = data.credits_remaining;
                    localStorage.setItem('credits', userCredits);
                    document.getElementById('creditsDisplay').textContent = userCredits + ' Credits';
                    document.getElementById('creditCount').textContent = userCredits;
                    
                    resultBox.innerHTML = `
                        <div class="summary-output">
                            <strong style="color:#4ade80;">Summary:</strong><br><br>
                            ${data.summary}
                        </div>
                        <p style="color:#aaa;margin-top:10px;font-size:12px;">
                            Credits remaining: ${data.credits_remaining} | Time: ${data.metadata.processing_time.toFixed(2)}s
                        </p>
                    `;
                } else {
                    showResult(resultBox, '❌ ' + data.error, 'error');
                }
            })
            .catch(err => {
                showResult(resultBox, '❌ Error: ' + err.message, 'error');
            });
        }

        function buyCredits() {
            fetch('/buy-credits', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': 'Bearer ' + userToken
                },
                body: JSON.stringify({})
            })
            .then(r => r.json())
            .then(data => {
                if (data.checkout_url) {
                    window.open(data.checkout_url, '_blank');
                } else {
                    alert('Error: ' + (data.error || 'Could not create checkout'));
                }
            });
        }

        function showResult(element, message, type) {
            element.classList.add('show');
            element.innerHTML = message;
            element.className = 'result-box show ' + type;
        }

        function logout() {
            localStorage.clear();
            location.reload();
        }
    </script>
</body>
</html>
