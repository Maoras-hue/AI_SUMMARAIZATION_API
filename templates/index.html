<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Text Summarizer</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #1a1a2e;
            color: #ffffff;
            min-height: 100vh;
        }
        .navbar {
            background: #16213e;
            padding: 16px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #e94560;
        }
        .navbar h1 { color: #e94560; font-size: 22px; }
        .credits-badge {
            background: #e94560;
            padding: 8px 18px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 14px;
        }
        .logout-btn {
            background: transparent;
            border: 1px solid #e94560;
            color: #e94560;
            padding: 6px 14px;
            border-radius: 15px;
            cursor: pointer;
            font-size: 13px;
            margin-left: 10px;
        }
        .container { max-width: 800px; margin: 0 auto; padding: 30px 20px; }
        .card {
            background: #16213e;
            border-radius: 12px;
            padding: 28px;
            margin-bottom: 22px;
            border: 1px solid #0f3460;
        }
        .card h2 { 
            color: #e94560;
            margin-bottom: 18px;
            font-size: 19px;
            border-bottom: 1px solid #0f3460;
            padding-bottom: 10px;
        }
        .form-group { margin-bottom: 14px; }
        label {
            display: block;
            margin-bottom: 5px;
            color: #aaa;
            font-size: 13px;
            font-weight: bold;
        }
        input, textarea {
            width: 100%;
            padding: 11px 14px;
            border: 1px solid #0f3460;
            border-radius: 6px;
            background: #1a1a2e;
            color: #ffffff;
            font-size: 15px;
            outline: none;
        }
        input:focus, textarea:focus {
            border-color: #e94560;
        }
        textarea { min-height: 180px; resize: vertical; font-family: inherit; }
        button {
            padding: 11px 26px;
            background: #e94560;
            color: #ffffff;
            border: none;
            border-radius: 6px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            margin-right: 8px;
            margin-top: 6px;
            transition: background 0.2s;
        }
        button:hover { background: #c73e54; }
        button.secondary {
            background: transparent;
            border: 1px solid #e94560;
            color: #e94560;
        }
        button.secondary:hover {
            background: #e94560;
            color: #ffffff;
        }
        .message-box {
            padding: 14px;
            border-radius: 6px;
            margin-top: 12px;
            display: none;
            font-size: 14px;
            line-height: 1.5;
        }
        .message-box.show { display: block; }
        .message-box.success {
            background: rgba(74, 222, 128, 0.15);
            border: 1px solid #4ade80;
            color: #4ade80;
        }
        .message-box.error {
            background: rgba(233, 69, 96, 0.15);
            border: 1px solid #e94560;
            color: #e94560;
        }
        .message-box.info {
            background: rgba(59, 130, 246, 0.15);
            border: 1px solid #3b82f6;
            color: #3b82f6;
        }
        .summary-output {
            background: #1a1a2e;
            padding: 18px;
            border-radius: 6px;
            line-height: 1.7;
            font-size: 15px;
            border: 1px solid #0f3460;
        }
        .tabs { display: flex; gap: 4px; margin-bottom: 18px; }
        .tab {
            padding: 9px 22px;
            background: transparent;
            border: 1px solid #0f3460;
            color: #aaa;
            cursor: pointer;
            border-radius: 6px 6px 0 0;
            font-size: 14px;
        }
        .tab.active { 
            background: #e94560;
            border-color: #e94560;
            color: #ffffff;
        }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
            margin-top: 10px;
        }
        .stat-item {
            background: #1a1a2e;
            padding: 16px;
            border-radius: 8px;
            text-align: center;
            border: 1px solid #0f3460;
        }
        .stat-value { font-size: 26px; color: #e94560; font-weight: bold; }
        .stat-label { font-size: 12px; color: #888; margin-top: 4px; }
        .hidden { display: none !important; }
    </style>
</head>
<body>
    <div class="navbar">
        <h1>AI Text Summarizer</h1>
        <div>
            <span class="credits-badge" id="creditsDisplay">0 Credits</span>
            <button class="logout-btn hidden" id="logoutBtn" onclick="doLogout()">Logout</button>
        </div>
    </div>

    <div class="container">
        <!-- Auth Section -->
        <div class="card" id="authCard">
            <h2>Account</h2>
            <div class="tabs">
                <button class="tab active" id="registerTabBtn" onclick="switchTab('register')">Register</button>
                <button class="tab" id="loginTabBtn" onclick="switchTab('login')">Login</button>
            </div>

            <div class="tab-content active" id="registerPanel">
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="regEmail" placeholder="Enter your email">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="regPassword" placeholder="Create a password">
                </div>
                <button onclick="handleRegister()">Create Account</button>
                <div class="message-box" id="regMessage"></div>
            </div>

            <div class="tab-content" id="loginPanel">
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="loginEmail" placeholder="Enter your email">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="loginPassword" placeholder="Enter your password">
                </div>
                <button onclick="handleLogin()">Sign In</button>
                <div class="message-box" id="loginMessage"></div>
            </div>
        </div>

        <!-- App Section -->
        <div id="appSection" class="hidden">
            <div class="card">
                <h2>Summarize Text</h2>
                <div class="form-group">
                    <label>Paste your text below</label>
                    <textarea id="textInput" placeholder="Paste the text you want to summarize here..."></textarea>
                </div>
                <button onclick="handleSummarize()">Summarize Now</button>
                <button class="secondary" onclick="handleBuyCredits()">Buy Credits - $10 for 1000</button>
                <div class="message-box" id="summaryMessage"></div>
                <div class="message-box" id="summaryOutput" style="display:none;"></div>
            </div>

            <div class="card">
                <h2>Your Stats</h2>
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-value" id="creditCount">0</div>
                        <div class="stat-label">Credits Remaining</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value" id="usageCount">0</div>
                        <div class="stat-label">API Calls Made</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        var token = null;
        var credits = 0;

        // Check for existing session
        var savedToken = localStorage.getItem('apitoken');
        if (savedToken) {
            verifyToken(savedToken);
        }

        function switchTab(tab) {
            document.getElementById('registerTabBtn').classList.remove('active');
            document.getElementById('loginTabBtn').classList.remove('active');
            document.getElementById('registerPanel').classList.remove('active');
            document.getElementById('loginPanel').classList.remove('active');
            
            if (tab === 'register') {
                document.getElementById('registerTabBtn').classList.add('active');
                document.getElementById('registerPanel').classList.add('active');
            } else {
                document.getElementById('loginTabBtn').classList.add('active');
                document.getElementById('loginPanel').classList.add('active');
            }
        }

        function showMessage(elementId, text, type) {
            var el = document.getElementById(elementId);
            el.textContent = text;
            el.className = 'message-box show ' + type;
        }

        function handleRegister() {
            var email = document.getElementById('regEmail').value.trim();
            var password = document.getElementById('regPassword').value;

            if (!email || !password) {
                showMessage('regMessage', 'Please fill in all fields.', 'error');
                return;
            }

            showMessage('regMessage', 'Creating account...', 'info');

            fetch('/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email: email, password: password })
            })
            .then(function(response) { return response.json(); })
            .then(function(data) {
                if (data.token) {
                    showMessage('regMessage', 'Account created successfully! You received 100 free credits.', 'success');
                    setSession(data.token, data.user.credits);
                } else {
                    showMessage('regMessage', data.error || 'Registration failed.', 'error');
                }
            })
            .catch(function() {
                showMessage('regMessage', 'Connection error. Please try again.', 'error');
            });
        }

        function handleLogin() {
            var email = document.getElementById('loginEmail').value.trim();
            var password = document.getElementById('loginPassword').value;

            if (!email || !password) {
                showMessage('loginMessage', 'Please fill in all fields.', 'error');
                return;
            }

            showMessage('loginMessage', 'Signing in...', 'info');

            fetch('/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email: email, password: password })
            })
            .then(function(response) { return response.json(); })
            .then(function(data) {
                if (data.token) {
                    showMessage('loginMessage', 'Signed in successfully!', 'success');
                    setSession(data.token, data.user.credits);
                } else {
                    showMessage('loginMessage', data.error || 'Login failed.', 'error');
                }
            })
            .catch(function() {
                showMessage('loginMessage', 'Connection error. Please try again.', 'error');
            });
        }

        function verifyToken(tok) {
            fetch('/credits', {
                headers: { 'Authorization': 'Bearer ' + tok }
            })
            .then(function(response) {
                if (response.ok) return response.json();
                throw new Error('Invalid');
            })
            .then(function(data) {
                setSession(tok, data.credits);
            })
            .catch(function() {
                localStorage.removeItem('apitoken');
                localStorage.removeItem('apicredits');
            });
        }

        function setSession(tok, creds) {
            token = tok;
            credits = creds;
            localStorage.setItem('apitoken', tok);
            localStorage.setItem('apicredits', creds);
            
            document.getElementById('authCard').classList.add('hidden');
            document.getElementById('appSection').classList.remove('hidden');
            document.getElementById('logoutBtn').classList.remove('hidden');
            document.getElementById('creditsDisplay').textContent = creds + ' Credits';
            document.getElementById('creditCount').textContent = creds;
        }

        function doLogout() {
            localStorage.removeItem('apitoken');
            localStorage.removeItem('apicredits');
            token = null;
            credits = 0;
            document.getElementById('authCard').classList.remove('hidden');
            document.getElementById('appSection').classList.add('hidden');
            document.getElementById('logoutBtn').classList.add('hidden');
            document.getElementById('creditsDisplay').textContent = '0 Credits';
        }

        function handleSummarize() {
            var text = document.getElementById('textInput').value.trim();

            if (!text) {
                showMessage('summaryMessage', 'Please enter some text to summarize.', 'error');
                return;
            }

            if (credits < 1) {
                showMessage('summaryMessage', 'Insufficient credits. Please buy more.', 'error');
                return;
            }

            showMessage('summaryMessage', 'Summarizing... This may take 30-60 seconds on first use.', 'info');
            document.getElementById('summaryOutput').style.display = 'none';

            fetch('/summarize', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': 'Bearer ' + token
                },
                body: JSON.stringify({ text: text })
            })
            .then(function(response) { return response.json(); })
            .then(function(data) {
                if (data.success) {
                    credits = data.credits_remaining;
                    localStorage.setItem('apicredits', credits);
                    document.getElementById('creditsDisplay').textContent = credits + ' Credits';
                    document.getElementById('creditCount').textContent = credits;
                    
                    showMessage('summaryMessage', '', 'success');
                    document.getElementById('summaryMessage').style.display = 'none';
                    
                    var out = document.getElementById('summaryOutput');
                    out.style.display = 'block';
                    out.className = 'message-box success';
                    out.innerHTML = '<strong>Summary:</strong><br><br>' + data.summary + 
                        '<br><br><small style="color:#888;">Credits used: 1 | Remaining: ' + credits + 
                        ' | Time: ' + data.metadata.processing_time.toFixed(2) + 's</small>';
                } else {
                    showMessage('summaryMessage', data.error || 'Summarization failed.', 'error');
                }
            })
            .catch(function() {
                showMessage('summaryMessage', 'Connection error. Please try again.', 'error');
            });
        }

        function handleBuyCredits() {
            fetch('/buy-credits', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': 'Bearer ' + token
                },
                body: JSON.stringify({})
            })
            .then(function(response) { return response.json(); })
            .then(function(data) {
                if (data.checkout_url) {
                    window.open(data.checkout_url, '_blank');
                } else {
                    alert(data.error || 'Could not create checkout session.');
                }
            })
            .catch(function() {
                alert('Connection error. Please try again.');
            });
        }
    </script>
</body>
</html>
